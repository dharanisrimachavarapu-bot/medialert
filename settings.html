<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - MedAlert</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
<div id="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar glass-panel">
        <div class="sidebar-header">
            <i class="fa-solid fa-notes-medical"></i>
            <h2>MedAlert</h2>
        </div>

        <ul class="nav-links">
            <li class="nav-item" onclick="window.location.href='dashboard.html'">
                <i class="fa-solid fa-house"></i> Dashboard
            </li>
            <li class="nav-item" onclick="window.location.href='medicines.html'">
                <i class="fa-solid fa-pills"></i> My Medicines
            </li>
            <li class="nav-item active">
                <i class="fa-solid fa-gear"></i> Settings
            </li>
        </ul>

        <div class="sidebar-footer">
            <div class="theme-toggle" onclick="toggleDarkMode()">
                <i class="fa-solid fa-moon"></i> Dark Mode
            </div>

            <div class="user-profile">
                <h4 id="userNameDisplay">User</h4>
            </div>

            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">

        <header class="top-header">
            <h2>Settings</h2>
        </header>

        <section class="page-view active">

            <!-- Profile -->
            <div class="settings-card glass-panel">
                <h3>👤 Profile</h3>
                <p>Name: <span id="profileName"></span></p>
            </div>

            <!-- Notifications -->
            <div class="settings-card glass-panel">
                <h3>🔔 Notifications</h3>
                <label>
                    <input type="checkbox" id="emailToggle">
                    Enable Email Alerts
                </label>
            </div>

            <!-- Export -->
            <div class="settings-card glass-panel">
                <h3>📊 Export Data</h3>
                <button onclick="exportCSV()" class="primary-btn">
                    Download CSV
                </button>
            </div>

            <!-- Danger Zone -->
            <div class="settings-card glass-panel">
                <h3>⚠️ Danger Zone</h3>
                <button onclick="clearData()" class="danger-btn">
                    Delete All Medicines
                </button>
            </div>

            <!-- About -->
            <div class="settings-card glass-panel">
                <h3>ℹ️ About</h3>
                <p>This system helps track medicine expiry and send alerts.</p>
            </div>

        </section>
    </div>

</div>

<!-- Scripts -->
<script src="config.js"></script>
<script src="app.js"></script>
<script src="notifications.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

/* ========================
   LOAD USER NAME
======================== */
document.getElementById("profileName").innerText =
    sessionStorage.getItem("activeName") || "User";

document.getElementById("userNameDisplay").innerText =
    sessionStorage.getItem("activeName") || "User";


/* ========================
   EMAIL TOGGLE
======================== */
const toggle = document.getElementById("emailToggle");

toggle.checked = localStorage.getItem("emailEnabled") !== "false";

toggle.addEventListener("change", () => {
    localStorage.setItem("emailEnabled", toggle.checked);
});


/* ========================
   CLEAR DATA
======================== */
function clearData() {
    if (confirm("Delete all medicines?")) {
        localStorage.removeItem("medicines");
        alert("All data cleared!");
    }
}


/* ========================
   EXPORT CSV
======================== */
function exportCSV() {
    const meds = JSON.parse(localStorage.getItem("medicines")) || [];

    let csv = "Name,Expiry,Category\n";

    meds.forEach(m => {
        csv += `${m.name},${m.expiry},${m.category}\n`;
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = "medicines.csv";
    link.click();
}

</script>

</body>
</html>
